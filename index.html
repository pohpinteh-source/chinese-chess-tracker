<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#f2f2f2;padding:10px;}
.card{background:white;padding:12px;margin-top:12px;border-radius:12px;}

button{width:100%;padding:10px;margin-top:5px;border:none;border-radius:10px;cursor:pointer;}
.primary{background:#2563eb;color:white;}
.red{background:#dc2626;color:white;}
.yellow{background:#facc15;color:black;}

.green{color:#16a34a;font-weight:bold;}
.orange{color:#f59e0b;font-weight:bold;}
.redText{color:#dc2626;font-weight:bold;}

table{width:100%;margin-top:10px;border-collapse:collapse;}
td,th{border:1px solid #ccc;padding:6px;text-align:center;}
.selected{background:#dbeafe;}

input,select{
  width:100%;
  padding:8px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

.title{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:22px;
  font-weight:bold;
}

.icon{
  font-size:28px;
  color:#dc2626;
}
</style>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycby8UlknONXQM9xr3sIc5ZuhTN11Vf402PZIu3nHwhZvdmi75XIKNlz5RJX-gcpwuUgK/exec";

function loadFromCloud(){

  fetch(API_URL)
.then(res=>res.json())
.then(data=>{

  // ✅ LOAD GAME RECORDS
  records = [];

  for(let i=1;i<data.game.length;i++){
    let r = data.game[i];

    records.push({
      competition:r[0],
      date:r[1],
      game:Number(r[2]),
      opponent:r[3],
      result:r[4],
      totalPlayers:Number(r[5])
    });
  }

  // ✅ LOAD FINAL RESULTS
  finalResults = {};

  for(let i=1;i<data.final.length;i++){
    let r = data.final[i];

    let key = r[0] + "_" + r[1];

    finalResults[key] = {
      competition:r[0],
      date:r[1],
      points:Number(r[2]),
      rank:r[3],
      players:r[4]
    };
  }

  saveLocal();
  update();



    alert("Data refreshed ✅");
  });
}

function saveFinalToCloud(){

  let comp=competitionName.value.trim();
  let date=competitionDate.value;

  let list = records.filter(r =>
    r.competition===comp && r.date===date
  );

  let pts=0;
  list.forEach(r=>{
    if(r.result==="win") pts++;
    if(r.result==="draw") pts+=0.5;
  });

  let rank=document.getElementById("rank").value;
  let players=document.getElementById("players").value;

  if(!rank||!players){
    alert("Fill rank & players");
    return;
  }

  fetch(API_URL,{
    method:"POST",

body:JSON.stringify({
  competition:comp,
  date,
  game,
  opponent,
  result,
  totalPlayers,
  type:"game"
})

  })
  .then(res=>res.text())
  .then(()=>alert("Final result saved to cloud ✅"));
}

let records = JSON.parse(localStorage.getItem("records")) || [];
let finalResults = JSON.parse(localStorage.getItem("finalResults")) || {};
let selectedIndex=-1;
let selectedFinalKey=null;

// ✅ NEW: track last saved game number
let lastSavedGameNumber = null;

function saveLocal(){
  localStorage.setItem("records", JSON.stringify(records));
  localStorage.setItem("finalResults", JSON.stringify(finalResults));
}

function newGame(){
  competitionName.value="";
  competitionDate.value="";
  totalPlayers.value="";
  opponent.value="";
  gameNumber.value=1;
  resultSelect.value="win";

  prediction.innerText="";
  analysisName.value="";
  analysisResult.innerHTML="";

  updateFinalResult();
}

function saveGame(){

  let comp=competitionName.value.trim();
  let date=competitionDate.value;
  let game=Number(gameNumber.value);
  let opp=opponent.value.trim();

  if(!comp||!date||!game||!opp){
    alert("Fill all fields");
    return;
  }

  if(lastSavedGameNumber !== null && game === lastSavedGameNumber){
    let confirmSave = confirm("⚠️ Game number is same as previous ("+game+").\nYou might have forgotten to change it.\n\nPress OK to continue or Cancel to change it.");
    if(!confirmSave) return;
  }

  let dup=records.find(r =>
    r.competition===comp &&
    r.game===game &&
    r.opponent===opp
  );

  if(dup){
    alert("Duplicate ❌");
    return;
  }

  records.push({
    competition:comp,
    date,
    game,
    opponent:opp,
    result:resultSelect.value,
    totalPlayers:Number(totalPlayers.value)||0
  });

  // ✅ AUTO SAVE TO CLOUD (GAME)
  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      competition:comp,
      date,
      game,
      opponent:opp,
      result:resultSelect.value,
      totalPlayers:Number(totalPlayers.value)||0,
      type:"game"
    })
  });

  lastSavedGameNumber = game;

  saveLocal();
  update();
}

function editRecord(i){

  let r=records[i];

  let comp=prompt("Competition",r.competition); if(!comp)return;
  let date=prompt("Date",r.date); if(!date)return;
  let game=prompt("Game",r.game); if(!game)return;
  let opp=prompt("Opponent",r.opponent); if(!opp)return;
  let res=prompt("Result",r.result); if(!res)return;
  let players=prompt("Players",r.totalPlayers); if(!players)return;

  records[i]={competition:comp,date,game:Number(game),opponent:opp,result:res,totalPlayers:Number(players)||0};

  saveLocal();
  update();
}

function deleteSelected(){
  if(selectedIndex<0){alert("Select row");return;}
  records.splice(selectedIndex,1);
  selectedIndex=-1;
  saveLocal();
  update();
}

function selectRow(i){
  selectedIndex=i;
  update();
}

function selectFinal(key){
  selectedFinalKey=key;
  update();
}

function deleteFinalSelected(){
  if(!selectedFinalKey){
    alert("Select final row");
    return;
  }
  delete finalResults[selectedFinalKey];
  selectedFinalKey=null;
  saveLocal();
  update();
}

function editFinal(key){

  let r=finalResults[key];

  let comp=prompt("Competition",r.competition); if(!comp)return;
  let date=prompt("Date",r.date); if(!date)return;
  let pts=prompt("Points",r.points); if(!pts)return;
  let rank=prompt("Rank",r.rank); if(!rank)return;
  let players=prompt("Players",r.players); if(!players)return;

  delete finalResults[key];

  finalResults[comp+"_"+date]={
    competition:comp,
    date,
    points:Number(pts),
    rank,
    players
  };

  saveLocal();
  update();
}

function saveFinal(){

  let comp=competitionName.value.trim();
  let date=competitionDate.value;

  if(!comp||!date){
    alert("Enter competition & date");
    return;
  }

  let list=records.filter(r=>r.competition===comp && r.date===date);

  let pts=0;
  list.forEach(r=>{
    if(r.result==="win") pts++;
    if(r.result==="draw") pts+=0.5;
  });

  let rank=document.getElementById("rank").value;
  let players=document.getElementById("players").value;

  if(!rank||!players){
    alert("Fill rank & players");
    return;
  }

  finalResults[comp+"_"+date]={
    competition:comp,
    date,
    points:pts,
    rank,
    players
  };
// ✅ SAVE FINAL TO CLOUD (AUTO)
  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      competition:comp,
      date,
      points:pts,
      rank,
      totalPlayersFinal:players,
      type:"final"
    })
  });

  saveLocal();
  update();
}

function updateSummary(){

  let total=records.length;
  let win=records.filter(r=>r.result==="win").length;
  let draw=records.filter(r=>r.result==="draw").length;
  let lose=records.filter(r=>r.result==="lose").length;

  summary.innerText=
`Total: ${total}
Win: ${win} (${((win/total||0)*100).toFixed(1)}%)
Draw: ${draw} (${((draw/total||0)*100).toFixed(1)}%)
Lose: ${lose} (${((lose/total||0)*100).toFixed(1)}%)`;
}

function predict(){

  if(records.length===0){
    prediction.innerText="";
    return;
  }

  let totalAll = records.length;
  let winAll = records.filter(r=>r.result==="win").length;
  let drawAll = records.filter(r=>r.result==="draw").length;

  let wrAll = (winAll + drawAll*0.5) / totalAll;

  let comp = competitionName.value.trim();
  let date = competitionDate.value;

  let list = records.filter(r =>
    r.competition===comp && r.date===date
  );

  let totalComp = list.length;
  let winComp = list.filter(r=>r.result==="win").length;
  let drawComp = list.filter(r=>r.result==="draw").length;

  let wrComp = totalComp
    ? (winComp + drawComp*0.5) / totalComp
    : 0;

  let players = Number(totalPlayers.value) || 30;

  let base = (1 - wrComp) * players;

  let low = Math.max(1, Math.round(base*0.85));
  let high = Math.max(1, Math.round(base*1.15));

  prediction.innerText =
`Win% Overall: ${(wrAll*100).toFixed(1)}%
Win% This Competition: ${(wrComp*100).toFixed(1)}%
Rank Estimate: ${low} - ${high}`;
}

function analysis(){

  let name = analysisName.value;
  let list = records.filter(r=>r.opponent===name);

  if(!list.length){
    analysisResult.innerHTML="";
    return;
  }

  let total = list.length;
  let win = list.filter(r=>r.result==="win").length;
  let draw = list.filter(r=>r.result==="draw").length;
  let lose = list.filter(r=>r.result==="lose").length;

  analysisResult.innerHTML =
`<b>Name: ${name}</b><br><br>
Game Play: ${total}<br>
<span class="green">Win: ${win} | ${(win/total*100).toFixed(1)}%</span><br>
<span class="orange">Draw: ${draw} | ${(draw/total*100).toFixed(1)}%</span><br>
<span class="redText">Lose: ${lose} | ${(lose/total*100).toFixed(1)}%</span>`;
}

function clearAnalysis(){
  analysisName.value="";
  analysisResult.innerHTML="";
}

function updateFinalResult(){

  let comp=competitionName.value.trim();
  let date=competitionDate.value;

  let html="";

  let list = records.filter(r =>
    r.competition===comp && r.date===date
  );

  let pts=0;
  list.forEach(r=>{
    if(r.result==="win") pts++;
    if(r.result==="draw") pts+=0.5;
  });

  html+=`
<h4>Add / Update Final Result</h4>
Competition: ${comp || ""}<br>
Date: ${date || ""}<br>
Points: ${comp && date ? pts : ""}<br><br>

Rank:<input id="rank"><br>
Players:<input id="players"><br>

<button class="primary" onclick="saveFinal()">Save Final Result</button>
`;

  let keys=Object.keys(finalResults);

  if(keys.length){

    html+=`
<h4>Final Results</h4>
<button class="red" onclick="deleteFinalSelected()">Delete Selected</button>

<table>
<tr>
<th>Competition</th>
<th>Date</th>
<th>Points</th>
<th>Rank</th>
<th>Players</th>
<th>Edit</th>
</tr>`;

    keys.forEach(k=>{
      let r=finalResults[k];

      html+=`
<tr onclick="selectFinal('${k}')" class="${selectedFinalKey===k?'selected':''}">
<td>${r.competition}</td>
<td>${r.date}</td>
<td>${r.points}</td>
<td>${r.rank}</td>
<td>${r.players}</td>
<td><button onclick="event.stopPropagation();editFinal('${k}')">Edit</button></td>
</tr>`;
    });

    html+="</table>";
  }

  finalResult.innerHTML=html;
}

function update(){
  updateSummary();
  predict();
  updateFinalResult();

  let html="";
  records.forEach((r,i)=>{

    let color =
      r.result==="win"?"green":
      r.result==="draw"?"orange":"redText";

    html+=`
<tr onclick="selectRow(${i})" class="${selectedIndex===i?'selected':''}">
<td>${r.competition}</td>
<td>${r.date}</td>
<td>${r.game}</td>
<td>${r.opponent}</td>
<td class="${color}">${r.result}</td>
<td>${r.totalPlayers}</td>
<td><button onclick="event.stopPropagation();editRecord(${i})">Edit</button></td>
</tr>`;
  });

  gameTable.innerHTML=html;
}

window.onload=()=>{

  for(let i=1;i<=15;i++){
    gameNumber.innerHTML+=`<option>${i}</option>`;
  }

  // ✅ AUTO LOAD FROM CLOUD
 fetch(API_URL)
.then(res=>res.json())
.then(data=>{

  // ✅ LOAD GAME RECORDS
  records=[];

  for(let i=1;i<data.game.length;i++){
    let r=data.game[i];

    records.push({
      competition:r[0],
      date:r[1],
      game:Number(r[2]),
      opponent:r[3],
      result:r[4],
      totalPlayers:Number(r[5])
    });
  }

  // ✅ LOAD FINAL RESULTS
  finalResults={};

  for(let i=1;i<data.final.length;i++){
    let r=data.final[i];

    let key = r[0] + "_" + r[1];

    finalResults[key] = {
      competition:r[0],
      date:r[1],
      points:Number(r[2]),
      rank:r[3],
      players:r[4]
    };
  }

  saveLocal();
  update();
});
};

</script>

</head>

<body>

<div class="title">
 
  <div>Chess Tracker</div>
</div>

<div class="card">
<h3>Summary</h3>
<div id="summary"></div>
</div>

<div class="card">
<input id="competitionName" placeholder="Competition">
<input id="competitionDate" type="date">
<input id="totalPlayers" placeholder="Players">

<select id="gameNumber"></select>
<input id="opponent" placeholder="Opponent">

<select id="resultSelect">
<option value="win">Win</option>
<option value="draw">Draw</option>
<option value="lose">Lose</option>
</select>

<button class="primary" onclick="saveGame()">Save Result</button>
<button class="red" onclick="newGame()">New Game</button>
<button onclick="loadFromCloud()">Refresh Data</button>
</div>

<div class="card">
<h3>Prediction</h3>
<p id="prediction"></p>
</div>

<div class="card">
<h3>Opponent Analysis</h3>
<input id="analysisName" oninput="analysis()" placeholder="Name">
<button class="yellow" onclick="clearAnalysis()">Clear</button>
<p id="analysisResult"></p>
</div>

<div class="card">
<h3>Final Result</h3>
<div id="finalResult"></div>
</div>

<div class="card">
<h3>Game Record</h3>
<button class="red" onclick="deleteSelected()">Delete Selected</button>

<table>
<thead>
<tr>
<th>Competition</th><th>Date</th><th>Game</th><th>Opponent</th><th>Result</th><th>Players</th><th>Edit</th>
</tr>
</thead>
<tbody id="gameTable"></tbody>
</table>

</div>

</body>
</html>
